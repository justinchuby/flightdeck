# flightdeck.config.yaml — Example configuration
#
# Config file resolution order:
#   1. FLIGHTDECK_CONFIG env var (highest priority)
#   2. Repo-level flightdeck.config.yaml (if exists — project overrides)
#   3. ~/.flightdeck/config.yaml (default — auto-created on first run)
#
# This file is 100% optional. Without it, the system uses built-in defaults.
# Hot-reloaded: changes take effect without server restart.
# Section-specific notes on timing are inline.
#
# Precedence: hardcoded defaults ← this file ← env vars (startup-only) ← API PATCH

server:
  maxConcurrentAgents: 50    # immediate effect; min 1, max 200

heartbeat:
  idleThresholdMs: 60000           # immediate — how long before nudging idle lead
  crewUpdateIntervalMs: 180000     # immediate — CREW_UPDATE push interval
  staleTimerCleanupDays: 7         # next cleanup cycle

models:
  known:
    - claude-opus-4.6
    - claude-sonnet-4.6
    - claude-sonnet-4.5
    - claude-haiku-4.5
    - claude-opus-4.5
    - claude-sonnet-4
    - gemini-3-pro-preview
    - gpt-5.4
    - gpt-5.3-codex
    - gpt-5.2-codex
    - gpt-5.2
    - gpt-5.1-codex-max
    - gpt-5.1-codex
    - gpt-5.1
    - gpt-5.1-codex-mini
    - gpt-5-mini
    - gpt-4.1
  defaults:
    developer: [claude-opus-4.6]
    architect: [claude-opus-4.6]
    code-reviewer: [gemini-3-pro-preview, claude-opus-4.6]
    critical-reviewer: [gemini-3-pro-preview]
    readability-reviewer: [gemini-3-pro-preview]
    tech-writer: [claude-sonnet-4.6, gpt-5.2]
    secretary: [gpt-4.1, gpt-5.2]
    qa-tester: [claude-sonnet-4.6]
    designer: [claude-opus-4.6]
    product-manager: [gpt-5.3-codex]
    generalist: [claude-opus-4.6]
    radical-thinker: [gemini-3-pro-preview]
    agent: [claude-sonnet-4.6]
    lead: [claude-opus-4.6]

roles:
  # Override built-in role properties without code changes.
  # Only specified fields are overridden — omitted fields keep built-in defaults.
  # developer:
  #   model: claude-sonnet-4.6        # override default model for developer role
  # secretary:
  #   model: gpt-4.1

budget:
  limit: null                         # null = unlimited, number = dollar cap
  thresholds:
    warning: 0.7
    critical: 0.9
    pause: 1.0

provider:
  id: copilot                         # Default provider for spawning agents — one of the 6 below
  # binaryOverride: null              # Override binary path (optional)
  # argsOverride: null                # Override spawn args (optional)
  # envOverride: {}                   # Extra env vars (optional)

# Toggle individual providers on/off and set per-provider model preferences.
# All detected providers are enabled by default; disable ones you don't use.
# Also configurable via Settings → Providers in the dashboard.
providerSettings:
  copilot:
    enabled: true
    models: []                        # per-provider model preferences (empty = use defaults)
  claude:
    enabled: true
    models: []
  gemini:
    enabled: true
    models: []
  codex:
    enabled: true
    models: []
  cursor:
    enabled: true
    models: []
  opencode:
    enabled: true
    models: []

# Provider preference order — first available provider is used when the
# default (provider.id) is unavailable. Drag-to-reorder in the Settings UI.
providerRanking:
  - copilot
  - claude
  - gemini
  - codex
  - cursor
  - opencode

# ── Provider reference ──────────────────────────────────────────────
# Uncomment the provider block you want to use and set id: above.
#
# ┌─────────┬──────────────┬───────────────────────┬──────────────────────────┐
# │ id      │ name         │ binary                │ required env vars        │
# ├─────────┼──────────────┼───────────────────────┼──────────────────────────┤
# │ copilot │ GitHub       │ copilot               │ (none — uses gh auth)    │
# │         │ Copilot      │ --acp --stdio         │                          │
# ├─────────┼──────────────┼───────────────────────┼──────────────────────────┤
# │ claude  │ Claude Code  │ claude                │ ANTHROPIC_API_KEY        │
# │         │              │ --acp --stdio         │                          │
# ├─────────┼──────────────┼───────────────────────┼──────────────────────────┤
# │ gemini  │ Google       │ gemini                │ GEMINI_API_KEY           │
# │         │ Gemini CLI   │ --experimental-acp    │                          │
# ├─────────┼──────────────┼───────────────────────┼──────────────────────────┤
# │ codex   │ Codex CLI    │ codex                 │ OPENAI_API_KEY           │
# │         │              │ --acp                 │                          │
# ├─────────┼──────────────┼───────────────────────┼──────────────────────────┤
# │ cursor  │ Cursor       │ agent                 │ CURSOR_API_KEY           │
# │         │              │ acp                   │                          │
# ├─────────┼──────────────┼───────────────────────┼──────────────────────────┤
# │ opencode│ OpenCode     │ opencode              │ (none)                   │
# │         │              │ acp                   │                          │
# └─────────┴──────────────┴───────────────────────┴──────────────────────────┘
#
# Example: Switch to Claude Code
# provider:
#   id: claude
#   envOverride:
#     ANTHROPIC_API_KEY: sk-ant-...
#
# Example: Switch to Gemini
# provider:
#   id: gemini
#   envOverride:
#     GEMINI_API_KEY: AIza...
#
# Example: Switch to Codex CLI
# provider:
#   id: codex
#   envOverride:
#     OPENAI_API_KEY: sk-...
#
# Example: Switch to Cursor
# provider:
#   id: cursor
#   envOverride:
#     CURSOR_API_KEY: cur-...
#
# Example: Switch to OpenCode
# provider:
#   id: opencode

# ── Telegram Integration ──────────────────────────────────────────
# Connect Flightdeck to Telegram for mobile notifications and bidirectional
# messaging with your AI crew. See docs/guides/telegram-setup.md for the
# full setup walkthrough.
#
# Quick start:
#   1. Create a bot via @BotFather on Telegram → get a bot token
#   2. Set TELEGRAM_BOT_TOKEN env var (preferred) or botToken below
#   3. Find your chat ID (see setup guide) and add it to allowedChatIds
#   4. Enable via Settings UI or PATCH /api/integrations/telegram
#
# Security: The bot is disabled by default and requires manual enablement
# each server start. The allowlist denies all chats when empty.
#
telegram:
  enabled: false                # Must be enabled each server start (intentional)
  botToken: ''                  # Bot token from @BotFather
                                # Prefer TELEGRAM_BOT_TOKEN env var — keeps
                                # secrets out of config files committed to git
  allowedChatIds: []            # Telegram chat IDs allowed to interact with the bot
                                # Empty list = deny all chats (secure default)
                                # Use strings: ['123456789', '-1001234567890']
                                # Negative IDs are group chats
  rateLimitPerMinute: 20        # Max inbound messages per user per minute (1–120)
                                # Protects against message floods
