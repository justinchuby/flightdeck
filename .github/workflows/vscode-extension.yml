name: VS Code Extension

on:
  push:
    branches: [main]
    paths:
      - 'packages/vscode/**'
      - 'packages/shared/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/vscode/**'
      - 'packages/shared/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared types
        run: npm run build --workspace=packages/shared

      - name: Typecheck
        run: npx --workspace=packages/vscode tsc --noEmit

      - name: Build extension
        run: cd packages/vscode && node esbuild.js

      - name: Unit tests
        run: npx vitest run packages/vscode/src/__tests__/

      - name: Package VSIX (verify)
        run: cd packages/vscode && npx @vscode/vsce package --no-dependencies --skip-license
