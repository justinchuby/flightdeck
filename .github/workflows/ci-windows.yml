name: CI (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        shell: bash

      - name: Build shared types
        run: npm run build --workspace=packages/shared
        shell: bash

      - name: Typecheck server
        run: npx --workspace=packages/server tsc --noEmit
        shell: bash

      - name: Typecheck web
        run: npx --workspace=packages/web tsc --noEmit
        shell: bash

      - name: Server unit tests with coverage
        run: npm run test:coverage --workspace=packages/server
        shell: bash

      - name: Web unit tests with coverage
        run: npm run test:coverage --workspace=packages/web
        shell: bash

      - name: Upload server coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: packages/server/coverage/lcov.info
          flags: server-windows
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload web coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: packages/web/coverage/lcov.info
          flags: web-windows
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
