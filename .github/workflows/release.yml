name: Release to npm

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Update npm to latest version for OIDC support
        run: npm install -g npm@latest

      - run: npm ci

      - name: Build
        run: npm run build

      - name: CLI smoke test
        run: |
          node bin/flightdeck.mjs --no-browser &
          SERVER_PID=$!
          sleep 5
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo 'ERROR: Server process died — likely a missing dependency'
            exit 1
          fi
          kill $SERVER_PID 2>/dev/null
          wait $SERVER_PID 2>/dev/null || true
          echo 'Smoke test passed — server started successfully'

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
