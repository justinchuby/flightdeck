name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared types
        run: npm run build --workspace=packages/shared

      - name: Typecheck server
        run: npx --workspace=packages/server tsc --noEmit

      - name: Typecheck web
        run: npx --workspace=packages/web tsc --noEmit

      - name: Check for type drift
        run: |
          # Ensure no server/web file re-defines types that should come from @flightdeck/shared
          DRIFT=0
          for TYPE in AgentStatus DagTaskStatus DelegationStatus DecisionStatus DecisionCategory TimerStatus AlertSeverity ActionType; do
            if grep -rn "export type $TYPE = " packages/server/src/ packages/web/src/ --include="*.ts" | grep -v "from '@flightdeck/shared'" | grep -v "node_modules"; then
              echo "ERROR: $TYPE defined outside @flightdeck/shared"
              DRIFT=1
            fi
          done
          for IFACE in Role DagTask Delegation ChatGroup GroupMessage Decision Timer Project ProjectSession ActivityEntry Alert FileLock; do
            if grep -rn "export interface $IFACE " packages/server/src/ packages/web/src/ --include="*.ts" | grep -v "node_modules" | grep -v "extends"; then
              echo "ERROR: $IFACE interface defined outside @flightdeck/shared"
              DRIFT=1
            fi
          done
          exit $DRIFT

      - name: Build all packages
        run: npm run build

      - name: CLI smoke test
        run: |
          node bin/flightdeck.mjs --no-browser &
          SERVER_PID=$!
          sleep 5
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo 'ERROR: Server process died — likely a missing dependency'
            exit 1
          fi
          kill $SERVER_PID 2>/dev/null
          wait $SERVER_PID 2>/dev/null || true
          echo 'Smoke test passed — server started successfully'

      - name: Unit tests with coverage
        run: npm run test:coverage --workspace=packages/server

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: packages/server/coverage/lcov.info
          flags: server
          fail_ci_if_error: false
